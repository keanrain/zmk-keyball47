CONFIG_BT_PERIPHERAL_PREF_MAX_INT=9
CONFIG_BT_PERIPHERAL_PREF_LATENCY=16
CONFIG_BT_L2CAP_TX_BUF_COUNT=32

# 蓝牙缓冲区配置：满足 BT_BUF_EVT_RX_COUNT > BT_BUF_ACL_TX_COUNT
# 蓝牙 ACL 传输缓冲区数量（推荐 8，按需可调整为 4/6）
CONFIG_BT_BUF_ACL_TX_COUNT=8
# 蓝牙事件接收缓冲区数量（推荐 16，必须大于 ACL_TX_COUNT，按需可调整为 10/12）
CONFIG_BT_BUF_EVT_RX_COUNT=16

# set transmission power to max
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 从键盘映射或专用硬件启用软关闭功能
CONFIG_ZMK_PM_SOFT_OFF=y


# ===================== 自动休眠相关 =====================
# 启用蓝牙电池服务
CONFIG_BT_BAS=y
# 自动休眠
CONFIG_ZMK_SLEEP=y
# （已注释）进入自动休眠的时间（单位：ms）
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
#进入空闲状态的时间（单位：ms）
CONFIG_ZMK_IDLE_TIMEOUT=60000

# ===================== BLE实验性功能 =====================
# 启用BLE实验性连接特性
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# 主控端获取从端电池电量
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# 主控端代理电池电量
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
# 行为队列大小，提升宏/组合键响应能力
CONFIG_ZMK_BEHAVIORS_QUEUE_SIZE=512

# ===================== 显示屏相关 =====================
# 启用显示屏支持
CONFIG_ZMK_DISPLAY=y
# 键盘空闲时息屏
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y


# ===================== 引脚控制 =====================
# 启用引脚控制
CONFIG_PINCTRL=y

# ===================== 指点设备（鼠标）相关 =====================
# 启用指点设备支持
CONFIG_ZMK_POINTING=y
# 启用平滑滚动
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# ===================== USB日志 =====================
# 启用USB日志输出
CONFIG_ZMK_USB_LOGGING=n

# Enable 32kHz crystal
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_30PPM=y

CONFIG_GPIO=y
